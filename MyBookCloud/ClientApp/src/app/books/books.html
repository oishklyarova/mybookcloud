<div class="books-container">
  <div class="header">
    <h1>Books Collection</h1>
    <div class="actions">
      <button mat-raised-button color="primary" (click)="addBook()">
        <mat-icon>add</mat-icon> Add Book
      </button>
      <button mat-stroked-button color="primary" (click)="logout()">
        <mat-icon>logout</mat-icon> Logout
      </button>
    </div>
  </div>

  <div *ngIf="error" class="error-message">
    <p>{{ error }}</p>
    <button mat-raised-button color="warn" (click)="loadBooks()">Retry</button>
  </div>

  <div *ngIf="loading && !error" class="loading">
    <p>Loading books...</p>
  </div>

  <div *ngIf="!loading && !error && books.length > 0" class="books-grid">
    <mat-card *ngFor="let book of books" class="book-card">
      <mat-card-header>
        <mat-card-title>{{ book.title }}</mat-card-title>
        <mat-card-subtitle>{{ book.author }}</mat-card-subtitle>
      </mat-card-header>
      <mat-card-content>
        <div class="book-main">
          <div class="book-cover-wrapper" *ngIf="book.coverThumbnailUrl; else noCover">
            <img
              [src]="book.coverThumbnailUrl"
              [alt]="book.title + ' cover'"
              class="book-cover"
            />
          </div>
          <ng-template #noCover>
            <div class="book-cover placeholder">
              <mat-icon>menu_book</mat-icon>
            </div>
          </ng-template>

          <div class="book-details">
            <div class="book-info">
              <div class="status-badge" [ngClass]="'status-' + book.status">
                {{ getStatusLabel(book.status) }}
              </div>
              <div class="rating" *ngIf="book.personalRating">
                Rating: <span class="rating-value">{{ book.personalRating }}/5</span>
              </div>
            </div>

            <div class="meta-row">
              <span class="meta-item" *ngIf="book.isbn">ISBN: {{ book.isbn }}</span>
              <span class="meta-item" *ngIf="book.pageCount">
                {{ book.pageCount }} pages
              </span>
            </div>

            <p class="summary" *ngIf="book.note">{{ book.note }}</p>
          </div>
        </div>
      </mat-card-content>
      <mat-card-actions align="end">
        <button mat-icon-button color="primary" (click)="editBook(book)">
          <mat-icon>edit</mat-icon>
        </button>
        <button mat-icon-button color="warn" (click)="deleteBook(book)">
          <mat-icon>delete</mat-icon>
        </button>
      </mat-card-actions>
    </mat-card>
  </div>

  <div *ngIf="!loading && !error && books.length === 0" class="no-data">
    <p>No books available. Start by adding your first book!</p>
  </div>
</div>
